<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAU 2026 · Study Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#efefef;--muted:#777;--accent:#c8a45a;--r:10px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;min-height:100vh;padding:24px 20px}
#app{max-width:1080px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;border-bottom:1px solid var(--border);padding-bottom:16px}
.header h1{font-size:20px;font-weight:300;letter-spacing:0.06em}
.header h1 span{color:var(--accent)}
.header-right{display:flex;align-items:flex-end;gap:14px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555;margin-bottom:6px;flex-shrink:0;transition:background 0.3s}
.sync-dot.ok{background:#6db86d}.sync-dot.err{background:#c85a5a}.sync-dot.busy{background:#c8a45a}
.countdown{text-align:right}
.countdown .days{font-size:32px;font-weight:200;color:var(--accent);line-height:1}
.countdown .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:3px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:6px}
.val{font-size:26px;font-weight:200;line-height:1}
.val small{font-size:12px;color:var(--muted);font-weight:400}
.charts-row{display:grid;grid-template-columns:240px 1fr;gap:8px;margin-bottom:16px}
.card,.chart-full,.form-card,.history-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.chart-full,.form-card,.history-card{margin-bottom:16px}
.card h3,.chart-full h3,.form-card h3,.history-card h3{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:14px}
.subject-legend{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.sdot{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sbars{display:flex;flex-direction:column;gap:9px}
.sbar-row{display:grid;grid-template-columns:72px 1fr 34px;gap:8px;align-items:center}
.sbar-label{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbar-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width 0.4s}
.sbar-h{font-size:11px;color:var(--muted);text-align:right}
.form-top{display:grid;grid-template-columns:130px 1fr 90px auto;gap:10px;margin-bottom:10px;align-items:end}
.form-mid{display:grid;grid-template-columns:1fr 160px;gap:10px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
.fg input,.fg select,.fg textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:9px 11px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.15s;width:100%;-webkit-appearance:none;appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:52px}
.fg select option{background:#1c1c1c}
.score-sel{display:flex;gap:5px;margin-top:1px}
.sbtn{width:36px;height:36px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.sbtn:hover{border-color:var(--accent);color:var(--accent)}
.sbtn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.btn-add{background:var(--accent);color:#000;border:none;border-radius:8px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.15s;letter-spacing:0.02em;margin-top:12px;-webkit-tap-highlight-color:transparent;min-height:44px;width:100%}
.btn-add:hover{opacity:0.82}
.btn-add:disabled{opacity:0.5;cursor:not-allowed}
.sess-row{display:grid;grid-template-columns:82px 90px 1fr 52px 46px 24px;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px}
.sess-row:last-child{border-bottom:none}
.dcol{color:var(--muted);font-size:11px}
.badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block}
.hcol{text-align:right;color:var(--accent);font-weight:600}
.stars{display:flex;gap:2px;justify-content:center}
.star{width:6px;height:6px;border-radius:1px;background:var(--border2)}
.star.on{background:var(--accent)}
.delbtn{background:none;border:none;color:var(--border2);cursor:pointer;font-size:16px;padding:0;transition:color 0.15s;line-height:1}
.delbtn:hover{color:#c85a5a}
.empty{text-align:center;color:var(--muted);font-size:12px;padding:28px 0}
.note-line{font-size:10px;color:#555;padding:0 0 6px 82px;border-bottom:1px solid var(--border)}
@media(max-width:700px){
  body{padding:14px 13px}
  .header h1{font-size:16px}
  .countdown .days{font-size:26px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:7px}
  .stat-card .val{font-size:22px}
  .charts-row{grid-template-columns:1fr}
  .form-top{grid-template-columns:1fr 1fr}
  .form-top>:nth-child(2){grid-column:1/-1}
  .form-mid{grid-template-columns:1fr}
  .sess-row{grid-template-columns:68px 84px 1fr 44px 28px}
  .sess-row>.delbtn-wrap{display:none}
}
@media(max-width:400px){
  .sess-row{grid-template-columns:64px 1fr 40px}
  .sess-row>.stars,.sess-row>.delbtn-wrap{display:none}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>PAU 2026 <span>·</span> Study Tracker</h1>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot" title="Estat sincronització"></div>
      <div class="countdown">
        <div class="days" id="cd">—</div>
        <div class="label">dies fins examen</div>
      </div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="lbl">Hores totals</div><div class="val" id="s-h">0 <small>h</small></div></div>
    <div class="stat-card"><div class="lbl">Sessions</div><div class="val" id="s-s">0</div></div>
    <div class="stat-card"><div class="lbl">Ratxa actual</div><div class="val" id="s-r">0 <small>dies</small></div></div>
    <div class="stat-card"><div class="lbl">Nota mitja</div><div class="val" id="s-a">— <small>/5</small></div></div>
  </div>

  <div class="charts-row">
    <div class="card">
      <h3>Distribució</h3>
      <div style="position:relative;height:160px"><canvas id="donut" role="img" aria-label="Hores per assignatura"></canvas></div>
      <div class="subject-legend" id="leg"></div>
    </div>
    <div class="card">
      <h3>Hores per assignatura</h3>
      <div class="sbars" id="sbars"></div>
    </div>
  </div>

  <div class="chart-full">
    <h3>Hores per dia · últims 21 dies</h3>
    <div style="position:relative;height:130px"><canvas id="line" role="img" aria-label="Hores per dia"></canvas></div>
  </div>

  <div class="form-card">
    <h3>+ Nova sessió</h3>
    <div class="form-top">
      <div class="fg"><label>Data</label><input type="date" id="f-date"></div>
      <div class="fg"><label>Assignatura</label>
        <select id="f-subj">
          <option value="">Selecciona...</option>
          <option>Empresa</option><option>Geografia</option><option>Matemàtiques</option>
          <option>Castellà</option><option>Català</option><option>Història</option><option>Anglès</option>
        </select>
      </div>
      <div class="fg"><label>Hores</label><input type="number" id="f-hours" min="0.25" max="8" step="0.25" placeholder="1.5" inputmode="decimal"></div>
      <div class="fg"><label>Percepció</label>
        <div class="score-sel" id="score-sel">
          <button class="sbtn" data-s="1">1</button><button class="sbtn" data-s="2">2</button>
          <button class="sbtn" data-s="3">3</button><button class="sbtn" data-s="4">4</button>
          <button class="sbtn" data-s="5">5</button>
        </div>
      </div>
    </div>
    <div class="form-mid">
      <div class="fg"><label>Tema/es coberts</label><input type="text" id="f-topics" placeholder="p.ex. VAN, TIR, Payback"></div>
      <div class="fg"><label>Tipus de tasca</label>
        <select id="f-type">
          <option value="T">Teoria (T)</option><option value="EX">Exercicis (EX)</option>
          <option value="PAU">Exàmens antics (PAU)</option><option value="SIM">Simulacre (SIM)</option>
          <option value="R">Repàs (R)</option>
        </select>
      </div>
    </div>
    <div class="fg"><label>Notes (opcional)</label><textarea id="f-notes" placeholder="Dubtes, aspectes a repassar..."></textarea></div>
    <button class="btn-add" id="btn-add" onclick="add()">Afegir sessió</button>
  </div>

  <div class="history-card">
    <h3>Historial de sessions</h3>
    <div id="hist"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SUBJ=['Empresa','Geografia','Matemàtiques','Castellà','Català','Història','Anglès'];
const COL={Empresa:'#c8a45a',Geografia:'#5b9bd5',Matemàtiques:'#6db86d',Castellà:'#a87bc8',Català:'#d4845a',Història:'#c85a5a',Anglès:'#5ab8a0'};
const API='/api/sessions';
const IS_LOCAL=location.hostname==='localhost'||location.hostname==='127.0.0.1'||location.protocol==='file:';

let sessions=JSON.parse(localStorage.getItem('pau26')||'[]');
let selScore=0,dC,lC,saving=false;

document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
document.querySelectorAll('.sbtn').forEach(b=>b.addEventListener('click',()=>{
  selScore=parseInt(b.dataset.s);
  document.querySelectorAll('.sbtn').forEach(x=>x.classList.toggle('active',parseInt(x.dataset.s)<=selScore));
}));

function dot(state){document.getElementById('sync-dot').className='sync-dot '+state;}

async function load(){
  if(IS_LOCAL){render();return;}
  dot('busy');
  try{
    const r=await fetch(API);
    if(r.ok){
      const d=await r.json();
      if(d.sessions&&d.sessions.length>0){
        sessions=d.sessions;
        localStorage.setItem('pau26',JSON.stringify(sessions));
        dot('ok');
      } else if(sessions.length>0){
        await push();
      } else {
        dot('ok');
      }
    } else { dot('err'); }
  }catch{dot('err');}
  render();
}

async function push(){
  if(IS_LOCAL||sessions.length===0)return;
  dot('busy');
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessions})});
    r.ok?dot('ok'):dot('err');
  }catch{dot('err');}
}

function save(){
  localStorage.setItem('pau26',JSON.stringify(sessions));
  push();
}

function add(){
  const date=document.getElementById('f-date').value;
  const subj=document.getElementById('f-subj').value;
  const hours=parseFloat(document.getElementById('f-hours').value);
  const topics=document.getElementById('f-topics').value.trim();
  const type=document.getElementById('f-type').value;
  const notes=document.getElementById('f-notes').value.trim();
  if(!date||!subj||!hours||hours<=0){alert('Omple data, assignatura i hores.');return;}
  sessions.unshift({id:Date.now(),date,subj,topics,hours,type,score:selScore,notes});
  save();render();
  ['f-subj','f-hours','f-topics','f-notes'].forEach(id=>document.getElementById(id).value='');
  selScore=0;document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
}

function del(id){sessions=sessions.filter(s=>s.id!==id);save();render();}

function getH(){const h={};SUBJ.forEach(s=>h[s]=0);sessions.forEach(s=>{if(h[s.subj]!==undefined)h[s.subj]+=s.hours;});return h;}

function render(){
  const exam=new Date('2026-06-09');const today=new Date();today.setHours(0,0,0,0);
  document.getElementById('cd').textContent=Math.max(0,Math.round((exam-today)/86400000));

  const h=getH();const total=Object.values(h).reduce((a,b)=>a+b,0);
  document.getElementById('s-h').innerHTML=(Math.round(total*10)/10)+'<small> h</small>';
  document.getElementById('s-s').textContent=sessions.length;

  const dates=[...new Set(sessions.map(s=>s.date))].sort();
  let streak=0;
  if(dates.length){
    const td=new Date().toISOString().split('T')[0];
    const yd=new Date(Date.now()-86400000).toISOString().split('T')[0];
    let cur=dates.includes(td)?td:(dates.includes(yd)?yd:null);
    if(cur){streak=1;let d=new Date(cur);while(true){d.setDate(d.getDate()-1);const ds=d.toISOString().split('T')[0];if(dates.includes(ds))streak++;else break;}}
  }
  document.getElementById('s-r').innerHTML=streak+'<small> dies</small>';
  const sc=sessions.filter(s=>s.score>0);
  const avg=sc.length?(sc.reduce((a,s)=>a+s.score,0)/sc.length):null;
  document.getElementById('s-a').innerHTML=(avg?Math.round(avg*10)/10:'—')+'<small> /5</small>';

  const active=SUBJ.filter(s=>h[s]>0);
  const dc=document.getElementById('donut');
  if(dC)dC.destroy();
  if(!active.length){dc.style.display='none';document.getElementById('leg').innerHTML='<span style="color:#555;font-size:11px">Cap sessió registrada</span>';}
  else{
    dc.style.display='block';
    dC=new Chart(dc,{type:'doughnut',data:{labels:active,datasets:[{data:active.map(s=>h[s]),backgroundColor:active.map(s=>COL[s]),borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${Math.round(c.parsed*10)/10}h (${Math.round(c.parsed/total*100)}%)`}}}}});
    document.getElementById('leg').innerHTML=active.map(s=>`<div class="sdot"><div class="dot" style="background:${COL[s]}"></div>${s.substring(0,3).toUpperCase()}</div>`).join('');
  }

  const maxH=Math.max(...Object.values(h),0.1);
  document.getElementById('sbars').innerHTML=SUBJ.map(s=>`<div class="sbar-row"><div class="sbar-label" title="${s}">${s}</div><div class="sbar-track"><div class="sbar-fill" style="width:${Math.round(h[s]/maxH*100)}%;background:${COL[s]}"></div></div><div class="sbar-h">${Math.round(h[s]*10)/10}h</div></div>`).join('');

  const ll=[],ld=[];
  for(let i=20;i>=0;i--){const d=new Date(Date.now()-i*86400000);ll.push(d.toLocaleDateString('ca',{day:'numeric',month:'short'}));ld.push(Math.round(sessions.filter(s=>s.date===d.toISOString().split('T')[0]).reduce((a,s)=>a+s.hours,0)*10)/10);}
  const lc=document.getElementById('line');if(lC)lC.destroy();
  lC=new Chart(lc,{type:'line',data:{labels:ll,datasets:[{data:ld,borderColor:'#c8a45a',backgroundColor:'rgba(200,164,90,0.07)',borderWidth:1.5,pointRadius:3,pointBackgroundColor:'#c8a45a',fill:true,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#555',font:{size:10},maxTicksLimit:7,maxRotation:0},grid:{color:'rgba(255,255,255,0.035)'},border:{color:'rgba(255,255,255,0.07)'}},y:{min:0,ticks:{color:'#555',font:{size:10},stepSize:1},grid:{color:'rgba(255,255,255,0.035)'},border:{color:'rgba(255,255,255,0.07)'}}}}});

  const hist=document.getElementById('hist');
  if(!sessions.length){hist.innerHTML='<div class="empty">Cap sessió registrada.</div>';return;}
  const stars=n=>!n?'<span style="color:#444;font-size:10px">—</span>':Array.from({length:5},(_,i)=>`<div class="star${i<n?' on':''}"></div>`).join('');
  hist.innerHTML=sessions.slice(0,40).map(s=>`<div class="sess-row"><div class="dcol">${s.date}</div><div><span class="badge" style="background:${COL[s.subj]}1a;color:${COL[s.subj]}">${s.subj}</span></div><div style="font-size:12px;color:#ccc;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${s.topics||'—'} <span style="color:#444;font-size:10px">[${s.type}]</span></div><div class="hcol">${Math.round(s.hours*10)/10}h</div><div class="stars">${stars(s.score)}</div><div class="delbtn-wrap"><button class="delbtn" onclick="del(${s.id})">×</button></div></div>${s.notes?`<div class="note-line">${s.notes}</div>`:''}`).join('');
}

load();
</script>
</body>
</html>
